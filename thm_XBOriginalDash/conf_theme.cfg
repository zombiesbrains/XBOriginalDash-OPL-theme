# XBOriginalDash OPL Theme

bg_color=#1b1b1b
sel_text_color=#f4f23c
settings_text_color=#107c10
text_color=#107c10
ui_text_color=#5cff1c
default_font=XboxOriginalBold.ttf

#game art background, defaults to xbox bg without game art
main0:
    type=Background
    pattern=BG
    default=xbg
    aligned=0
    scaled=0
    width=DIM_INF
    height=DIM_INF

#xbox dashboard backdrop, displays game art in the center
main1:
    type=StaticImage
    default=xbg_transparent
    aligned=0
    scaled=0
    width=DIM_INF
    height=DIM_INF

#games list
main2:
    type=ItemsList
    x=270
    y=110
    color=#1b1b1b
    width=400
    height=240

#type of device the games are on
main3:
    type=MenuIcon
    x=193
    y=38
    aligned=0
    scaled=0
    width=250
    height=27

#official game title code
main4:
    type=ItemText
    aligned=0
    x=65
    y=370
    color=#107c10

#cover art
main5:
    type=ItemCover
    pattern=COV
    x=65
    y=110
    width=130
    height=240
    aligned=0

#spine over game art
main6:
    type=StaticImage
    default=cover_spine
    x=65
    y=105
    width=135
    height=245
    aligned=0

#button options
main7:
    type=HintText
    aligned=1
    x=POS_MID
    y=-30

#loading game data message
main8:
    type=LoadingIcon
    x=POS_MID
    y=POS_MID
    width=180
    height=68

#game info page background, right now its just the menu background if the game art background does not exist (the info page is formatted around the menu background currently)
info0:
    type=Background
    pattern=BG
    default=xbg
    aligned=0
    scaled=0
    width=DIM_INF
    height=DIM_INF

#title
info1:
    type=AttributeText
    attribute=Title
    display=1
    aligned=0
    x=45
    y=45
    width=350
    color=#f4f23c

#genre
info2:
    type=AttributeText
    attribute=Genre
    display=1
    aligned=0
    x=45
    y=80
    width=350
    color=#5cff1c

#developer
info3:
    type=AttributeText
    attribute=Developer
    display=1
    aligned=0
    x=45
    y=110
    width=350
    color=#5cff1c

#description
info4:
    type=AttributeText
    attribute=Description
    display=2
    aligned=0
    x=45
    y=140
    width=350
    height=220
    wrap=1
    color=#107c10

#game code
info5:
	type=ItemText
	aligned=1
	color=#5cff1c
	x=520
	y=90
	width=50

#game filesize
info6:
	type=AttributeText
	attribute=#Size
	display=1
	aligned=0
	color=#5cff1c
	x=45
	y=415

#screenshot 1
info7:
    type=GameImage
    pattern=SCR
    scaled=1
    x=420
    y=115
    width=200
    height=130
    aligned=0

#screenshot 2
info8:
    type=GameImage
    pattern=SCR2
    scaled=1
    x=420
    y=265
    width=200
    height=130
    aligned=0

#ESRB (or equivalent) rating
info9:
	type=AttributeText
	attribute=Parental
	default=RP
	display=2
	aligned=1
	color=#5cff1c
	x=520
	y=425

#release year
info10:
	type=AttributeText
	attribute=Release
	display=1
	color=#5cff1c
	aligned=1
	x=POS_MID
	y=425

#button options
info11:
    type=HintText
    aligned=1
    x=POS_MID
    y=-30

#players
info12:
    type=AttributeImage
    attribute=Players
    default=1_Players
	x=45
	y=340
    width=60
    height=40
    scaled=0
    aligned=0

#loading game data message
info13:
    type=LoadingIcon
    x=POS_MID
    y=POS_MID
    width=180
    height=68

